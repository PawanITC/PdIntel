services:

  postgres:
    image: postgres:16-alpine
    container_name: plany-postgres
    environment:
      POSTGRES_DB: plany_dev
      POSTGRES_USER: plany
      POSTGRES_PASSWORD: plany
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plany -d plany_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: plany-localstack
    environment:
      SERVICES: kinesis
      KINESIS_INITIALIZE_STREAMS: "pd-payment-kinesis-euw2:1"
      AWS_DEFAULT_REGION: eu-west-2
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"kinesis\": \"available\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: plany-payment-service
    profiles:
      - app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/plany_dev
      DB_USERNAME: plany
      DB_PASSWORD: plany
      KINESIS_ENDPOINT: http://localstack:4566
      AWS_REGION: eu-west-2
      KINESIS_STREAM_NAME: pd-payment-kinesis-euw2
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
