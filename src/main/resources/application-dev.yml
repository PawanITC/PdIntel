spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plany_dev}
    username: ${DB_USERNAME:plany}
    password: ${DB_PASSWORD:plany}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    uk.co.pdintel: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: DEBUG

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

auth:
  mock:
    token: dev-static-token
    council-ids: 123e4567-e89b-12d3-a456-426614174000,223e4567-e89b-12d3-a456-426614174001
