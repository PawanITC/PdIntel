spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

auth:
  cognito:
    issuer-uri: ${COGNITO_ISSUER_URI}
    # Override these only if your Cognito token uses non-standard claim names
    # user-id-claim: sub
    # email-claim: email
    # council-ids-claim: custom:councilIds

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    root: WARN
    uk.co.pdintel: WARN

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
