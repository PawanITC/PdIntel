spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plany_test}
    username: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:test}
  jpa:
    show-sql: false
  flyway:
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: WARN
    uk.co.pdintel: DEBUG

stripe:
  api-key: sk_test_dummy
  webhook-secret: whsec_test_dummy
  base-url: http://localhost:8089

# WireMock on 8090 simulates the Cognito JWKS endpoint.
# CognitoWireMockBootstrap starts the server before this property is read.
auth:
  cognito:
    issuer-uri: http://localhost:8090/cognito-test
